name: Sync to R2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    uses: mycourse-work/.github/.github/workflows/sync-to-r2.yml@main
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
